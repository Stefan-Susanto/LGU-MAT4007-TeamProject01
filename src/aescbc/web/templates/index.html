<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AES-CBC Demo</title>
    <link rel="stylesheet" href="/static/css/styles.css?v={{ asset_version }}" />
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <h1>AES-CBC Encryption</h1>
        <p class="subtitle">From-scratch AES core with CBC mode, PKCS#7 padding, and authentication.</p>
        <div class="hero-actions">
          <button id="run-demo-btn" type="button">Run Typing Demo</button>
        </div>
      </header>

      <section class="workflow">
        <div class="lane">
          <h2 class="lane-title">Encryption</h2>

          <section class="card">
            <h3>Encrypt Text</h3>
            <form id="encrypt-form">
              <label for="enc-plaintext">Plaintext</label>
              <textarea id="enc-plaintext" rows="4" required></textarea>

              <label for="enc-key">Key (hex, 16/24/32 bytes)</label>
              <div class="secret-field">
                <input id="enc-key" type="password" required autocomplete="off" spellcheck="false" />
                <button type="button" class="toggle-secret" data-target="enc-key">Show</button>
              </div>

              <label for="enc-iv">IV (hex, optional 16 bytes)</label>
              <div class="secret-field">
                <input
                  id="enc-iv"
                  type="password"
                  placeholder="leave empty for random IV"
                  autocomplete="off"
                  spellcheck="false"
                />
                <button type="button" class="toggle-secret" data-target="enc-iv">Show</button>
              </div>

              <button type="submit">Encrypt</button>
            </form>

            <div class="result">
              <label for="out-ciphertext">Ciphertext (hex)</label>
              <textarea id="out-ciphertext" rows="3" readonly></textarea>

              <label for="out-tag">HMAC Tag (hex)</label>
              <div class="secret-field">
                <input id="out-tag" type="password" readonly autocomplete="off" spellcheck="false" />
                <button type="button" class="toggle-secret" data-target="out-tag">Show</button>
              </div>
            </div>
          </section>

        </div>

        <div class="lane">
          <h2 class="lane-title">Decryption</h2>

          <section class="card">
            <h3>Decrypt Text</h3>
            <form id="decrypt-form">
              <label for="dec-ciphertext">Ciphertext (hex)</label>
              <textarea id="dec-ciphertext" rows="3" required></textarea>

              <label for="dec-key">Key (hex)</label>
              <div class="secret-field">
                <input id="dec-key" type="password" required autocomplete="off" spellcheck="false" />
                <button type="button" class="toggle-secret" data-target="dec-key">Show</button>
              </div>

              <label for="dec-iv">IV (hex)</label>
              <div class="secret-field">
                <input id="dec-iv" type="password" required autocomplete="off" spellcheck="false" />
                <button type="button" class="toggle-secret" data-target="dec-iv">Show</button>
              </div>

              <label for="dec-tag">HMAC Tag (hex)</label>
              <div class="secret-field">
                <input id="dec-tag" type="password" required autocomplete="off" spellcheck="false" />
                <button type="button" class="toggle-secret" data-target="dec-tag">Show</button>
              </div>

              <button type="submit">Decrypt</button>
            </form>

            <div class="result">
              <label for="out-plaintext">Plaintext</label>
              <textarea id="out-plaintext" rows="3" readonly></textarea>
            </div>
          </section>

        </div>
      </section>

      <p id="status" class="status"></p>
    </main>

    <script src="/static/js/app.js?v={{ asset_version }}"></script>
  </body>
</html>
